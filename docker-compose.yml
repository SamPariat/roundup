version: "3.9"

services:
  postgres-venue:
    image: postgres:18-alpine
    container_name: roundup-postgres-venue
    environment:
      POSTGRES_DB: venue
      POSTGRES_USER: venue_user
      POSTGRES_PASSWORD: venue_pass
    ports:
      - "5438:5432"
    volumes:
      - venue_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venue_user -d venue"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    container_name: roundup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  venue_db_data:
  redis_data:
